name: onchain-spam

on:
  schedule:
    # Offset from hour-start to avoid GitHub Actions cron congestion (which is worst at :00).
    - cron: "2-59/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: onchain-spam
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - run: npm ci

      - name: Pulse one cycle
        env:
          MODE: once
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          VAULT_ADDRESS: ${{ secrets.VAULT_ADDRESS }}
          TOKEN_ADDRESS: ${{ secrets.TOKEN_ADDRESS }}
          TOKEN_DECIMALS: ${{ vars.TOKEN_DECIMALS || '6' }}
          AMOUNT: ${{ vars.AMOUNT || '0.01' }}
          CHAIN: ${{ vars.CHAIN || 'mainnet' }}
        run: node spam.mjs
